<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingressos - CINEPICLES</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- NAVBAR Responsivo -->
    <nav class="navbar navbar-expand-md navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">
                <img src="./img/logo.png" alt="CINEPICLES Logo" height="30" class="d-inline-block align-text-top me-2">
                CINEPICLES
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="./index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="./cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link" href="./cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link" href="./cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link active" href="./venda-ingressos.html">Ingressos</a></li>
                <li class="nav-item"><a class="nav-link" href="./sessoes.html">Sessões Disponíveis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Venda de Ingressos</h2>

        <div class="card mt-3">
            <div class="card-header">Nova Venda</div>
            <div class="card-body">
                <form id="formIngresso">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="sessaoId" class="form-label">Sessão</label>
                            <select class="form-select" id="sessaoId" required>
                                <option value="">Selecione uma sessão...</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="nomeCliente" class="form-label">Nome do Cliente</label>
                            <input type="text" class="form-control" id="nomeCliente" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="cpf" class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="assento" class="form-label">Assento (ex: A10)</label>
                            <input type="text" class="form-control" id="assento" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="tipoPagamento" class="form-label">Tipo de Pagamento</label>
                            <select class="form-select" id="tipoPagamento" required>
                                <option value="">Selecione...</option>
                                <option value="Cartão">Cartão</option>
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Confirmar Venda</button>
                </form>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">Ingressos Vendidos</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Sessão</th>
                                <th>Cliente</th>
                                <th>CPF</th>
                                <th>Assento</th>
                                <th>Pagamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaIngressos">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/ingressos.js"></script>
</body>
</html>
