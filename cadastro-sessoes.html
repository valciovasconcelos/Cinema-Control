<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões - CINEPICLES</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- NAVBAR Responsivo -->
    <nav class="navbar navbar-expand-md navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">
                <img src="./img/logo.png" alt="CINEPICLES Logo" height="30" class="d-inline-block align-text-top me-2">
                CINEPICLES
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="./index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="./cadastro-filmes.html">Filmes</a></li>
                <li class="nav-item"><a class="nav-link" href="./cadastro-salas.html">Salas</a></li>
                <li class="nav-item"><a class="nav-link active" href="./cadastro-sessoes.html">Sessões</a></li>
                <li class="nav-item"><a class="nav-link" href="./venda-ingressos.html">Ingressos</a></li>
                <li class="nav-item"><a class="nav-link" href="./sessoes.html">Sessões Disponíveis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Cadastro de Sessões</h2>

        <div class="card mt-3">
            <div class="card-header">Nova Sessão</div>
            <div class="card-body">
                <form id="formSessao">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="filmeId" class="form-label">Filme</label>
                            <select class="form-select" id="filmeId" required>
                                <option value="">Selecione um filme...</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="salaId" class="form-label">Sala</label>
                            <select class="form-select" id="salaId" required>
                                <option value="">Selecione uma sala...</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label for="dataHora" class="form-label">Data e Hora</label>
                            <input type="datetime-local" class="form-control" id="dataHora" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="preco" class="form-label">Preço (R$)</label>
                            <input type="number" class="form-control" id="preco" min="0" step="0.01" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="idioma" class="form-label">Idioma</label>
                            <select class="form-select" id="idioma" required>
                                <option value="">Selecione...</option>
                                <option value="Dublado">Dublado</option>
                                <option value="Legendado">Legendado</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="formato" class="form-label">Formato</label>
                            <select class="form-select" id="formato" required>
                                <option value="">Selecione...</option>
                                <option value="2D">2D</option>
                                <option value="3D">3D</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Sessão</button>
                </form>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">Sessões Cadastradas</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Filme</th>
                                <th>Sala</th>
                                <th>Data/Hora</th>
                                <th>Preço</th>
                                <th>Idioma</th>
                                <th>Formato</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaSessoes">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/sessoes.js"></script>
</body>
</html>
